<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AviatesAir — Virtual Airline Platform</title>
    <base href="/" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500;600&family=VT323&display=swap" rel="stylesheet">
    <!-- Apply saved theme before CSS renders to prevent flash of wrong theme -->
    <script>
        (function () {
            try {
                var t = localStorage.getItem('avt_theme') || 'system';
                var dark = t === 'dark' || (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
                if (dark) document.documentElement.setAttribute('data-theme', 'dark');
            } catch (e) {}
        })();
    </script>
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
    <div id="app">
        <div class="boot-screen">
            <div class="boot-logo">
                <svg class="boot-plane-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M6 26l10-4 4-12 4 4-6 8 14-4 4-8 3 1-2 9 9-2 1 3-9 3 2 9-3 1-4-8-14 5 5 9-4 1-6-11-10 3z" fill="#3B82F6"/>
                </svg>
                <span class="boot-brand">AVIATESAIR</span>
            </div>
            <div class="boot-progress">
                <div class="boot-progress-bar"></div>
            </div>
            <span class="boot-status">Initializing operations center...</span>
        </div>
    </div>
    <script src="_framework/blazor.webview.js" autostart="false"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/interop.js"></script>
    <!-- Takeoff performance calculation engine — load in dependency order -->
    <script src="js/performance/aircraft-configs.js"></script>
    <script src="js/performance/density.js"></script>
    <script src="js/performance/airspeed.js"></script>
    <script src="js/performance/flaps.js"></script>
    <script src="js/performance/flex.js"></script>
    <script src="js/performance/index.js"></script>
    <script>Blazor.start();</script>
</body>
</html>
